<?xml version='1.0'?>
<!-- <!DOCTYPE fontconfig SYSTEM 'fonts.dtd'> -->
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>

<fontconfig>
	<alias>
		<family>serif</family>
		<prefer>
			<family>Gohu Nerd Font</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>
	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Arimo Nerd Font</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>
	<alias>
		<family>sans</family>
		<prefer>
			<family>Arimo Nerd Font</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>
	<alias>
		<family>monospace</family>
		<prefer>
			<family>DejaVuSansMono Nerd Font</family>
			<family>Joy Pixels</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>
</fontconfig>
